name: Build & Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npx vite build

      - name: Test backend
        run: go test ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Fail if required secrets are missing
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          test -n "$DATABASE_URL"
          test -n "$ADMIN_USERNAME"
          test -n "$ADMIN_PASSWORD"
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ledvision:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ledvision:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: docker-compose.yml
          target: ${{ secrets.SERVER_PATH }}
          strip_components: 0

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ledvision:latest
          APP_PORT: "8082"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          envs: IMAGE_NAME,APP_PORT,DATABASE_URL,ADMIN_USERNAME,ADMIN_PASSWORD,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -e
            sudo mkdir -p ${{ secrets.SERVER_PATH }}
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} ${{ secrets.SERVER_PATH }}
            cd ${{ secrets.SERVER_PATH }}
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo usermod -aG docker ${{ secrets.SERVER_USER }}
            fi
            IMAGE_NAME_VALUE="$(printf '%s' "$IMAGE_NAME" | tr -d '\r\n')"
            APP_PORT_VALUE="$(printf '%s' "$APP_PORT" | tr -d '\r\n')"
            DATABASE_URL_VALUE="$(printf '%s' "$DATABASE_URL" | tr -d '\r\n')"
            ADMIN_USERNAME_VALUE="$(printf '%s' "$ADMIN_USERNAME" | tr -d '\r\n')"
            ADMIN_PASSWORD_VALUE="$(printf '%s' "$ADMIN_PASSWORD" | tr -d '\r\n')"
            TELEGRAM_BOT_TOKEN_VALUE="$(printf '%s' "$TELEGRAM_BOT_TOKEN" | tr -d '\r\n')"
            TELEGRAM_CHAT_ID_VALUE="$(printf '%s' "$TELEGRAM_CHAT_ID" | tr -d '\r\n')"
            printf '%s\n' "IMAGE_NAME=${IMAGE_NAME_VALUE}" "APP_PORT=${APP_PORT_VALUE}" "DATABASE_URL=${DATABASE_URL_VALUE}" "ADMIN_USERNAME=${ADMIN_USERNAME_VALUE}" "ADMIN_PASSWORD=${ADMIN_PASSWORD_VALUE}" "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_VALUE}" "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID_VALUE}" > .env
            sudo docker compose pull || sudo docker compose pull
            sudo docker compose up -d --force-recreate --remove-orphans
            sudo docker image prune -f
            sudo docker ps
